name: Shared NAS Deploy

on:
  workflow_call:
    inputs:
      deploy_dir:
        required: true
        type: string
        description: "パス: デプロイ先のディレクトリ (例: /volume1/docker/rosch-os)"
      compose_dir:
        required: true
        type: string
        description: "パス: docker-compose が実行されるディレクトリ (例: /volume1/docker/rosch-os)"
      container_name:
        required: true
        type: string
        description: "ログ取得用のコンテナ名"
      health_url:
        required: false
        type: string
        description: "ヘルスチェックURL。指定しない場合はスキップ。"
      setup_node:
        required: false
        type: boolean
        default: false
        description: "Node.js (v20) のセットアップを行うか"
      pre_deploy_script:
        required: false
        type: string
        description: "デプロイ前（Dockerビルド・Sync前）に実行するスクリプト"
      sync_excludes:
        required: false
        type: string
        default: "--exclude='node_modules' --exclude='data' --exclude='.git' --exclude='.DS_Store' --exclude='PLAN' --exclude='DOCUMENT'"
        description: "tar同期時の除外オプション"
      preserve_files:
        required: false
        type: string
        default: "data docker-compose.yml Dockerfile storage .env.production"
        description: "NAS側で上書きせず維持するファイルやディレクトリ（スペース区切り）"
      deploy_delay:
        required: false
        type: number
        default: 0
        description: "デバウンス秒数。cancel-in-progress: true と併用すると、push が落ち着いてからデプロイが実行される。0で即時実行。"
      post_build_script:
        required: false
        type: string
        description: "Dockerのビルド後（ダウンタイム前）の実行スクリプト (例: DBマイグレーションなど)"
      webhook_url:
        required: false
        type: string
        description: "※非推奨(Secrets推奨) Slack互換の通知用 Webhook URL。デプロイ完了時に通知を送信します。"
    secrets:
      WEBHOOK_URL:
        required: false
        description: "Slack互換の通知用 Webhook URL。デプロイ完了時に通知を送信します。"

jobs:
  deploy:
    runs-on: [self-hosted, nas]
    timeout-minutes: 30
    steps:
      - name: Debounce
        if: ${{ inputs.deploy_delay > 0 }}
        run: |
          echo "Waiting ${{ inputs.deploy_delay }}s for push activity to settle..."
          echo "If a new push arrives, this run will be cancelled (cancel-in-progress)."
          sleep ${{ inputs.deploy_delay }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: ${{ inputs.setup_node }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pre-deploy Script
        if: ${{ inputs.pre_deploy_script != '' }}
        run: ${{ inputs.pre_deploy_script }}

      - name: Ensure Disk Space
        run: |
          DEPLOY_DIR="${{ inputs.deploy_dir }}"
          FREE_MB=$(df -m "$DEPLOY_DIR" 2>/dev/null | awk 'NR==2{print $4}')
          if [ -n "$FREE_MB" ] && [ "$FREE_MB" -lt 2048 ]; then
              echo "WARNING: Low disk space (${FREE_MB}MB free). Running cleanup..."
              docker system prune -af --volumes --filter "until=24h" > /dev/null 2>&1 || true
              docker builder prune -af > /dev/null 2>&1 || true
          fi

      - name: Sync Code
        run: |
          DEPLOY_DIR="${{ inputs.deploy_dir }}"
          PRESERVE_FILES="${{ inputs.preserve_files }}"
          eval "tar cf - ${{ inputs.sync_excludes }} ." | \
          docker run --rm -i \
            -e PRESERVE="$PRESERVE_FILES" \
            -v "$DEPLOY_DIR":/deploy \
            alpine sh -c '
              cd /deploy
              # Preserve: save specified files (supports nested paths)
              for f in $PRESERVE; do
                if [ -e "$f" ]; then
                  mkdir -p "$(dirname "/tmp/_preserve/$f")"
                  cp -a "$f" "/tmp/_preserve/$f"
                fi
              done
              # Clean: remove all files including dotfiles
              find /deploy -mindepth 1 -maxdepth 1 -exec rm -rf {} +
              # Extract new code
              tar xf - -C /deploy
              # Restore preserved files
              for f in $PRESERVE; do
                if [ -e "/tmp/_preserve/$f" ]; then
                  mkdir -p "$(dirname "/deploy/$f")"
                  cp -a "/tmp/_preserve/$f" "/deploy/$f"
                fi
              done
            '

      - name: Save Rollback Images
        working-directory: ${{ inputs.compose_dir }}
        run: |
          # Tag current images as :rollback before building new ones
          for img in $(docker compose config --images 2>/dev/null); do
            if docker image inspect "$img" > /dev/null 2>&1; then
              docker tag "$img" "${img%:*}:rollback" 2>/dev/null || true
              echo "Saved rollback: ${img%:*}:rollback"
            fi
          done

      - name: Docker Build
        working-directory: ${{ inputs.compose_dir }}
        run: docker compose build

      - name: Post-build Script (Migrations)
        if: ${{ inputs.post_build_script != '' }}
        working-directory: ${{ inputs.compose_dir }}
        run: ${{ inputs.post_build_script }}

      - name: Swap Container (Clean Network)
        working-directory: ${{ inputs.compose_dir }}
        run: |
          docker compose down
          docker compose up -d

      - name: Health Check
        if: ${{ inputs.health_url != '' }}
        working-directory: ${{ inputs.compose_dir }}
        run: |
          HEALTH_URL="${{ inputs.health_url }}"
          CONTAINER_NAME="${{ inputs.container_name }}"
          for i in 1 2 3 4 5 6; do
            sleep 5
            HTTP_STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check OK (HTTP $HTTP_STATUS, attempt $i)"
              exit 0
            fi
            echo "Health check attempt $i: HTTP $HTTP_STATUS"
          done
          echo "ERROR: Health check failed after 30s"
          docker logs "$CONTAINER_NAME" --tail 30

          # Rollback: restore previous images and restart
          echo "--- Rollback: restoring previous images ---"
          ROLLED_BACK=false
          for img in $(docker compose config --images 2>/dev/null); do
            ROLLBACK_TAG="${img%:*}:rollback"
            if docker image inspect "$ROLLBACK_TAG" > /dev/null 2>&1; then
              docker tag "$ROLLBACK_TAG" "$img" 2>/dev/null || true
              ROLLED_BACK=true
              echo "Restored: $img from $ROLLBACK_TAG"
            fi
          done
          if [ "$ROLLED_BACK" = true ]; then
            docker compose down
            docker compose up -d
            echo "Rollback complete. Previous version restored."
          fi
          exit 1

      - name: Garbage Collection
        run: |
          docker container prune -f > /dev/null 2>&1 || true
          # Keep images from last 24h to preserve rollback tags and other project caches
          docker image prune -af --filter "until=24h" > /dev/null 2>&1 || true
          docker builder prune -af > /dev/null 2>&1 || true

      - name: Notify Webhook
        if: always()
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_INPUT: ${{ inputs.webhook_url }}
        run: |
          TARGET_URL="${WEBHOOK_SECRET:-$WEBHOOK_INPUT}"
          if [ -z "$TARGET_URL" ]; then
            echo "No webhook URL configured. Skipping notification."
            exit 0
          fi
          STATUS="success"
          COLOR="#36a64f"
          TITLE="Deployment Successful"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS="failure"
            COLOR="#dc3545"
            TITLE="Deployment Failed"
          fi
          PAYLOAD=$(cat <<EOF
          {
            "text": "Deploy ${STATUS}: ${{ github.repository }}",
            "attachments": [
              {
                "color": "${COLOR}",
                "title": "${TITLE}",
                "text": "Container **${{ inputs.container_name }}** — ${STATUS}"
              }
            ]
          }
          EOF
          )
          curl -sS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$TARGET_URL" || echo "Webhook notification failed."
